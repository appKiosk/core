name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Derive the correct SHAs for Nx affected on PR and push events.
      - uses: nrwl/nx-set-shas@v4

      - run: npm run check:lockfile-sync
      - run: npm ci

      - run: npx nx format:check --base="$NX_BASE" --head="$NX_HEAD"
      - run: npx nx affected -t lint test build --base="$NX_BASE" --head="$NX_HEAD"

  infra-kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform

      - run: ./infra/kubernetes/scripts/validate.sh
