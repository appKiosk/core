services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: core-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - '${CORE_KEYCLOAK_PORT:-8081}:8080'
    volumes:
      - keycloak_data:/opt/keycloak/data

  keycloak-migrate:
    image: quay.io/keycloak/keycloak:26.2
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/migrations:/opt/keycloak-data/migrations:ro
    entrypoint:
      - /bin/sh
      - /opt/keycloak-data/migrations/apply-migrations.sh
    restart: 'no'

volumes:
  keycloak_data:
