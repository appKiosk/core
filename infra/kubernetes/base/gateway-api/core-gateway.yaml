apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: core-gateway
  namespace: core-services
  labels:
    app.kubernetes.io/name: core-gateway
    app.kubernetes.io/part-of: appkiosk-core
spec:
  gatewayClassName: core-envoy-gateway
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: core.example.invalid
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: core-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: http
      protocol: HTTP
      port: 80
      hostname: core.example.invalid
      allowedRoutes:
        namespaces:
          from: Same
