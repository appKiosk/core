apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core-gateway
  namespace: core-services
spec:
  rules:
    - host: core.appkiosk.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  name: http
  tls:
    - hosts:
        - core.appkiosk.example
      secretName: prod-core-gateway-tls
