apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/environment: prod
      app.kubernetes.io/owner: platform-core

patches:
  - path: ingress.patch.yaml
    target:
      kind: Ingress
      name: core-gateway
      namespace: core-services
